name: Generate gRPC code

on:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proto repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Clone generated repo
        run: |
          git clone https://github.com/nurbo323/generated-contracts.git genrepo

      - name: Generate code
        run: |
          mkdir -p genrepo/gen/payment
          mkdir -p genrepo/gen/order

          protoc \
            --go_out=genrepo \
            --go-grpc_out=genrepo \
            proto/payment.proto \
            proto/order_tracking.proto

      - name: Push generated code
        run: |
          cd genrepo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update generated code" || echo "no changes"
          git push
